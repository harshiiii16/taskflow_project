<!-- src/app/components/shared/layout/layout.component.html -->
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">⬡ TaskFlow</div>

    <nav class="sidebar-nav">
      <div class="sidebar-label">Navigation</div>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span>◈</span> Dashboard
      </a>
      <a routerLink="/projects" routerLinkActive="active" class="nav-item">
        <span>◻</span> Projects
      </a>
      <a routerLink="/tasks" routerLinkActive="active" class="nav-item">
        <span>◎</span> Tasks
      </a>
      <a *ngIf="auth.isAdmin" routerLink="/team" routerLinkActive="active" class="nav-item">
        <span>◉</span> Team
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="avatar" [style.background]="auth.currentUser?.color + '22'"
             [style.color]="auth.currentUser?.color">
          {{ initials }}
        </div>
        <div>
          <div class="user-name">{{ auth.currentUser?.name?.split(' ')[0] }}</div>
          <div class="user-role">{{ auth.currentUser?.role }}</div>
        </div>
      </div>
      <button class="nav-item" (click)="logout()">
        <span>⎋</span> Sign Out
      </button>
    </div>
  </aside>

  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
